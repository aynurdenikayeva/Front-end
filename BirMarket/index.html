<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məhsullar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Ən çox satılanlar</h1>

        <div class="products">

            <div class="card">
                <img src="image/photo1.jpeg" alt="Məhsul">

                <span class="discount">-23%</span>

                <div class="price">
                    <span class="new-price">230 ₼</span>
                    <span class="old-price">300 ₼</span>
                </div>

                <p class="title">İnkubator 126 tutumlu</p>

                <button>Səbətə at</button>
            </div>

            <div class="card">
                <img src="image/yemek stulu.jpeg" alt="Məhsul">

                <span class="discount">-25%</span>

                <div class="price">
                    <span class="new-price">163.99 ₼</span>
                    <span class="old-price">217.55 ₼</span>
                </div>

                <p class="title">Uşaq yemək stulu</p>

                <button>Səbətə at</button>
            </div>

            <div class="card">
                <img src="image/usaqoyuncagi.webp" alt="Məhsul">

                <span class="discount">-32%</span>

                <div class="price">
                    <span class="new-price">378.99 ₼</span>
                    <span class="old-price">554.32 ₼</span>
                </div>

                <p class="title">Uşaq elektrik avtomobili</p>

                <button>Səbətə at</button>
            </div>

            <div class="card">
                <img src="image/usaqbezi.webp" alt="Məhsul">

                <span class="discount">-32%</span>

                <div class="price">
                    <span class="new-price">13.50 ₼</span>
                    <span class="old-price">19.90 ₼</span>
                </div>

                <p class="title">Uşaq bezi Predo Baby Mini 2, 3-6 kq, 76 əd.</p>

                <button>Səbətə at</button>
            </div>

            <div class="card">
                <img src="image/qulaqliq.webp" alt="Məhsul">

                <span class="discount">-32%</span>

                <div class="price">
                    <span class="new-price">7.79 ₼</span>
                    <span class="old-price">11.46 ₼</span>
                </div>

                <p class="title">Simsiz qulaqlıqlar BT Ultrapods Max Black</p>

                <button>Səbətə at</button>
            </div>
            

        </div>
    </div>

</body>
</html>
