<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məlumat</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="image/download (2).jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div>
        <h1>İstifadəçi haqqında məlumatlar</h1><br>

        <form>

            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname"><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname"><br>
            <label for="ename">Email:</label><br>
            <input type="email" id="ename" name="ename"><br>
            <label for="pname">Age:</label><br>
            <input type="number" id="pname" name="pname">
            <br>
            <p>İştirak növü:</p>
            <label for="iname">Online</label>
            <input type="radio" id="iname">
            <br>
            <label for="name">Offline</label>
            <input type="radio" id="name">
            <br>
            <label for="tedbir">Tədbir növü:</label>
            <br>

            <select name="tedbir" id="tedbir">
                <option value="Web">Web Development</option>
                <option value="Art">Artificial Intelligence</option>
                <option value="Cyber">Cyber Security</option>
                <option value="Mobile">Mobile Development</option>
            </select>
            <br>
            <label for="nameText">Əlavə məlumat:</label>
            <br>
            <textarea id="nameText" rows="4" cols="50">
                            </textarea>
            <br>
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            <button type="submit">Submit</button>

        </form>
    </div>
    
</body>

</html>
