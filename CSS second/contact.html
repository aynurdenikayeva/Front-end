<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body{
            background-color: antiquewhite;
        }
    </style>
    
</head>
<body>
    <div>
        <h1 style="text-align: center;">Bizim ilə əlaqə</h1><br>
    
        <form>
            <center>
                <label for="fname">First name:</label><br>
                <input type="text" id="fname" name="fname"><br>
                <label for="lname">Last name:</label><br>
                <input type="text" id="lname" name="lname"><br>
                <label for="ename">Email:</label><br>
                <input type="email" id="ename" name="ename"><br>
                <label for="pname">Password:</label><br>
                <input type="password" id="pname" name="pname">
                <br>
                <label for="nameText">Özünüz haqqında məlumat:</label>
                <br>
                <textarea id="nameText" rows="4" cols="50">
            </textarea>
                <br>
                <button type="submit">Məlumatı göndər</button>
            </center>
        </form>
    
    
    </div>
          

</body>
</html>
